# keymap-drawer config — https://github.com/caksoylar/keymap-drawer
# Renders config/lily58.keymap -> keymap-drawer/lily58.svg in CI (draw-keymaps.yml).
# Run `keymap dump-config` locally to see every available option and its default.

draw_config:
  dark_mode: auto # SVG follows the viewer's light/dark preference (GitHub README friendly)

  # ⚠️ RAW XML — HTML entities like &bull; / &amp; are UNDEFINED here and break SVG
  # parsing (GitHub then 404s the image). ALWAYS use literal unicode chars (•, ⌘, ←…).
  footer_text: "Lily58 • drawn with keymap-drawer"

  # Legends use plain unicode symbols (below), NOT $$mdi:...$$ icon glyphs — so rendering
  # needs no network fetch in CI and can never fail on a missing/renamed remote glyph.

  # Extra CSS appended AFTER the built-in light + dark styles, so it wins in both themes.
  # The @media block re-overrides colors when the viewer is in dark mode.
  svg_extra_style: |
    /* --- Modifier keys (⌘⌥⇧⌃): subtle indigo tint so the mod cluster reads as a group --- */
    rect.mod   { fill: #eef1ff; stroke: #c3cbf7; }
    /* --- Keys held to reach a layer: warm amber "hold me" accent --- */
    rect.held  { fill: #fdeecf; stroke: #eccf93; }
    /* --- Hold legends (homerow-mod symbols, toggle labels): accent colour + weight --- */
    text.hold  { fill: #4f57c4; font-weight: bold; }
    /* --- Layer-activator legends (Lower/Raise): accent + bold, keep the underline link --- */
    text.layer-activator { fill: #0f7c6c; font-weight: bold; }
    /* --- Footer: quiet it down --- */
    text.footer { fill: #8a8f96; }

    @media (prefers-color-scheme: dark) {
      rect.mod   { fill: #333a5c; stroke: #5866b0; }
      rect.held  { fill: #6b5327; stroke: #a9853f; }
      text.hold  { fill: #b4bbff; }
      text.layer-activator { fill: #58d6c3; }
      text.footer { fill: #7e8489; }
    }

parse_config:
  zmk_remove_keycode_prefix: ["C_"] # render media keys without the C_ prefix

  # raw_binding_map: prettify whole behavior bindings (params aren't keycodes, so
  # zmk_keycode_map can't reach them). Bluetooth: profile number on top, "BT" below;
  # clear gets a ✕. Unicode only (no fragile $$mdi:$$ glyphs), per the note above.
  raw_binding_map:
    "&bt BT_SEL 0": {t: "0", h: "BT"}
    "&bt BT_SEL 1": {t: "1", h: "BT"}
    "&bt BT_SEL 2": {t: "2", h: "BT"}
    "&bt BT_SEL 3": {t: "3", h: "BT"}
    "&bt BT_SEL 4": {t: "4", h: "BT"}
    "&bt BT_CLR":   {t: "✕", h: "BT clear"}

  # NOTE: setting zmk_keycode_map REPLACES the built-in default map entirely (it does NOT
  # merge). So every symbol we want pretty must be listed here — the punctuation block below
  # re-declares the defaults we rely on. Numbers (N1→1) and F-keys still fall through fine.
  zmk_keycode_map:
    # --- Modifiers → Mac glyphs. dict form adds CSS class "mod" to standalone mod keys.
    # Homerow-mod holds inherit only the tap glyph (⌘ etc.) as their hold legend, so those
    # letter keys stay un-tinted while thumb/pinky mod keys get the indigo accent.
    LGUI:  {t: "⌘", type: "mod"}
    RGUI:  {t: "⌘", type: "mod"}
    LCMD:  {t: "⌘", type: "mod"}
    RCMD:  {t: "⌘", type: "mod"}
    GUI:   {t: "⌘", type: "mod"}
    LALT:  {t: "⌥", type: "mod"}
    RALT:  {t: "⌥", type: "mod"}
    LSHFT: {t: "⇧", type: "mod"}
    RSHFT: {t: "⇧", type: "mod"}
    LSHIFT: {t: "⇧", type: "mod"}
    RSHIFT: {t: "⇧", type: "mod"}
    LCTRL: {t: "⌃", type: "mod"}
    RCTRL: {t: "⌃", type: "mod"}
    LCTL:  {t: "⌃", type: "mod"}
    RCTL:  {t: "⌃", type: "mod"}

    # --- Navigation / whitespace. Both the SHORT alias AND the FULL ZMK name are listed
    # for each, so a key renders the icon whether the keymap uses e.g. ESC or ESCAPE,
    # BSPC or BACKSPACE, APOS or APOSTROPHE. (keymap-drawer normalizes aliases, but
    # listing both makes it bulletproof against future keymap edits.)
    ESC:       "⎋"
    ESCAPE:    "⎋"
    TAB:       "⇥"
    BSPC:      "⌫"
    BACKSPACE: "⌫"
    BKSP:      "⌫"
    DEL:       "⌦"
    DELETE:    "⌦"
    RET:       "⏎"
    RETURN:    "⏎"
    ENTER:     "⏎"
    SPACE:     "␣"
    CAPS:      "⇪"
    CAPSLOCK:  "⇪"
    APOS:       "'"
    APOSTROPHE: "'"

    # NOTE: keymap-drawer does NOT parse ZMK sensor-bindings (encoders), so the
    # left rotary encoder does not appear in the diagram — its actions are noted in
    # the README instead. No encoder legends belong here.

    # --- Arrow cluster
    LEFT:  "←"
    DOWN:  "↓"
    UP:    "↑"
    RIGHT: "→"

    # --- Punctuation / symbols (re-declared because the map replaces defaults)
    EXCL: "!"
    AT: "@"
    HASH: "#"
    DOLLAR: "$"
    DLLR: "$"
    PRCNT: "%"
    CARET: "^"
    AMPS: "&"
    ASTRK: "*"
    STAR: "*"
    KP_MULTIPLY: "×"
    KP_PLUS: "+"
    PLUS: "+"
    MINUS: "-"
    UNDER: "_"
    UNDERSCORE: "_"
    EQUAL: "="
    LPAR: "("
    RPAR: ")"
    LBKT: "["
    RBKT: "]"
    LBRC: "{"
    RBRC: "}"
    SEMI: ";"
    COLON: ":"
    SQT: "'"
    DQT: "\""
    COMMA: ","
    DOT: "."
    LT: "<"
    GT: ">"
    FSLH: "/"
    QMARK: "?"
    BSLH: "\\"
    PIPE: "|"
    GRAVE: "`"
    TILDE: "~"
