# Deep sleep: drops idle drain to ~20uA after 30 min idle.
# Trade-off: ~2s BLE reconnect on wake; unsaved ZMK Studio changes are lost when sleep hits.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable ZMK Studio for Realtime Keymap Updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment the following line to enable USB Logging (this increases power usage by a significant amount, turn it off when not in use)
# CONFIG_ZMK_USB_LOGGING=y

# --- nice!view custom widgets (zmk-nice-oled module; nice_epaper shield = nice!view) ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_EPAPER_ON=y
CONFIG_NICE_OLED_ON=n

# Live modifier indicators (shows held ⌘⌥⇧⌃ — pairs with the homerow mods)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y

# Peripheral (right half) animation. Gem is the default; alternatives:
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y
# Battery saver: static image instead of animation on the peripheral:
# CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=y

# NOTE (RAM): avoid enabling WPM graph + Bongo Cat + Raw HID together — can exhaust nRF52840 RAM.
